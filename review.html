<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리뷰 답글 검토</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #222;
      background: #f3f4f6;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .header h1 {
      margin: 0 0 6px;
      font-size: 20px;
    }
    .header .sub {
      margin: 0 0 12px;
      color: #666;
      font-size: 13px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar .stat {
      color: #555;
      font-size: 13px;
      margin-right: auto;
    }
    .toolbar .stat strong { color: #0a7a3f; }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }
    button.primary {
      background: #03c75a;
      color: #fff;
    }
    button.secondary {
      background: #fff;
      color: #333;
      border: 1px solid #ccc;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .banner {
      margin: 16px 24px 0;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
    }
    .banner.info {
      background: #eef8f2;
      border: 1px solid #b8e6cc;
      color: #0a5c32;
    }
    .banner.success {
      background: #e8f4fd;
      border: 1px solid #b3d9f2;
      color: #0c4a6e;
    }
    .banner.warn {
      background: #fff4e5;
      border: 1px solid #f0d9a8;
      color: #9a6700;
    }
    #list {
      padding: 16px 24px 40px;
      max-width: 960px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card-id {
      font-weight: 700;
      color: #0a7a3f;
    }
    .card-meta {
      color: #888;
      font-size: 12px;
      text-align: right;
    }
    .review-box {
      background: #f9fafb;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.5;
      color: #444;
      white-space: pre-wrap;
    }
    .reply-label {
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .reply-input {
      width: 100%;
      min-height: 88px;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
    }
    .reply-input:focus {
      outline: none;
      border-color: #03c75a;
      box-shadow: 0 0 0 2px rgba(3,199,90,.15);
    }
    .char-count {
      text-align: right;
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>리뷰 답글 검토</h1>
    <p class="sub">AI가 생성한 답글을 확인·수정한 뒤, <strong>일괄 확인</strong>을 누르면 스마트스토어 답글창에 자동 입력됩니다.</p>
    <div class="toolbar">
      <div class="stat" id="statText">불러오는 중...</div>
      <button type="button" class="secondary" id="saveDraftBtn">임시 저장</button>
      <button type="button" class="primary" id="confirmBtn">일괄 확인 및 적용 활성화</button>
    </div>
  </div>

  <div id="banner" class="banner info" hidden></div>
  <div id="list"></div>

  <script src="config.js"></script>
  <script src="review.js"></script>
</body>
</html>
