<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>답글 스타일 선택</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      color: #1a1a1a;
      background: #eef1f5;
      padding-bottom: 96px;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #fff;
      border-bottom: 1px solid #dde2e8;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 24px 16px;
    }
    h1 { margin: 0 0 6px; font-size: 24px; font-weight: 800; }
    .sub { margin: 0; color: #666; font-size: 14px; line-height: 1.5; }
    .toolbar {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    select, .search {
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
    }
    .search { flex: 1; min-width: 180px; }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    button.secondary { background: #fff; color: #333; border: 1px solid #ccc; }
    button.reload { background: #0369a1; color: #fff; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .stats {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .stat {
      background: #fff;
      border: 1px solid #dde2e8;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
    }
    .stat strong { color: #2563eb; font-size: 18px; }
    .banner {
      max-width: 960px;
      margin: 0 auto 12px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .banner.info { background: #eef8f2; border: 1px solid #b8e6cc; color: #0a5c32; }
    .banner.warn { background: #fff4e5; border: 1px solid #f0d9a8; color: #9a6700; }
    .banner.error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
    .banner.success { background: #e8f4fd; border: 1px solid #b3d9f2; color: #0c4a6e; }
    .list {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card {
      display: flex;
      gap: 12px;
      background: #fff;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .card.selected { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.12); }
    .card.disabled { opacity: .55; cursor: not-allowed; }
    .card-check { margin-top: 4px; width: 18px; height: 18px; flex-shrink: 0; }
    .card-body { flex: 1; min-width: 0; }
    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .card-id { font-size: 12px; color: #888; font-weight: 700; }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #555;
    }
    .badge.rating { background: #fef3c7; color: #92400e; }
    .badge.missing { background: #fee2e2; color: #b91c1c; }
    .product { font-size: 12px; color: #666; margin-bottom: 8px; }
    .reply-text {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: #111;
    }
    .review-preview {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #e5e7eb;
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }
    .empty {
      text-align: center;
      padding: 64px 24px;
      color: #888;
      line-height: 1.6;
    }
    .footer {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: #fff;
      border-top: 1px solid #dde2e8;
      box-shadow: 0 -4px 16px rgba(0,0,0,.08);
    }
    .footer-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .footer-inner .summary { flex: 1; min-width: 200px; font-size: 15px; }
    .footer-inner .summary strong { color: #7c3aed; font-size: 20px; }
    .footer-inner .primary {
      background: #7c3aed;
      color: #fff;
      font-size: 16px;
      padding: 14px 22px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1>답글 스타일 선택</h1>
      <p class="sub">판매자센터에 등록한 답글 중 원하는 것만 골라 AI 톤(내 스타일)을 만듭니다.</p>
    </div>
  </header>

  <div class="toolbar">
    <select id="daysSelect" aria-label="조회 기간">
      <option value="30">최근 30일</option>
      <option value="60">최근 60일</option>
      <option value="90" selected>최근 90일</option>
    </select>
    <button type="button" class="reload" id="reloadBtn">답글 목록 불러오기</button>
    <input type="search" class="search" id="searchInput" placeholder="답글·상품명 검색" />
    <button type="button" class="secondary" id="selectAllBtn">본문 있는 답글 전체 선택</button>
    <button type="button" class="secondary" id="clearBtn">선택 해제</button>
  </div>

  <div class="stats">
    <div class="stat">목록 <strong id="totalCount">0</strong>건</div>
    <div class="stat">본문 읽기 가능 <strong id="readableCount">0</strong>건</div>
    <div class="stat">선택 <strong id="selectedCount">0</strong>건</div>
  </div>

  <div class="banner info" id="banner">판매자센터 [리뷰 관리] 탭을 연 뒤 [답글 목록 불러오기]를 누르세요.</div>

  <main class="list" id="list"></main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="summary"><strong id="footerCount">0</strong>개 선택 · 2개 이상 필요</div>
      <button type="button" class="primary" id="analyzeBtn" disabled>선택한 답글로 스타일 분석</button>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="style-pick.js"></script>
</body>
</html>
